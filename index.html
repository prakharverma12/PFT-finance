<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Panda Ledger</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B0A08">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panda">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0B0A08;
    --bg-vignette: radial-gradient(1200px 500px at 50% -10%, rgba(217,169,78,0.10), transparent 60%);
    --surface:#16140F;
    --surface-2:#1D1A14;
    --hairline:#2E2A22;
    --hairline-soft:#221F19;
    --ink:#F2EFE9;
    --ink-muted:#9C9484;
    --ink-faint:#635C4E;
    --brass:#D9A94E;
    --brass-dim:#8A6E36;
    --credit:#5FBF8F;
    --debit:#E2665A;
    --radius-sm:8px;
    --radius-md:14px;
    --radius-lg:20px;
    --font-mono:'IBM Plex Mono', ui-monospace, monospace;
    --font-sans:'IBM Plex Sans', system-ui, sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }

  body{
    background:var(--bg) var(--bg-vignette);
    color:var(--ink);
    font-family:var(--font-sans);
    width:100vw;
    min-height:100vh;
    overflow-x:hidden;
  }

  #app{ display:flex; flex-direction:column; min-height:100vh; position:relative; padding-bottom:env(safe-area-inset-bottom); }

  /* ---------- HEADER ---------- */
  .app-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 20px 16px;
    position:sticky;
    top:0;
    z-index:40;
    background:linear-gradient(var(--bg) 70%, transparent);
  }
  .brand{ display:flex; flex-direction:column; gap:2px; }
  .brand-mark{ font-family:var(--font-mono); font-size:0.68rem; letter-spacing:3px; color:var(--brass); text-transform:uppercase; }
  .brand-month{ font-family:var(--font-mono); font-size:1.15rem; font-weight:600; letter-spacing:0.5px; }

  .header-actions{ display:flex; gap:8px; }
  .icon-btn{
    width:40px; height:40px;
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:var(--radius-sm);
    color:var(--ink-muted);
    display:flex; align-items:center; justify-content:center;
    font-size:1.05rem;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .icon-btn:active{ border-color:var(--brass); color:var(--brass); }
  #btn-install{ display:none; }

  /* ---------- TABS ---------- */
  .tab-bar{
    display:flex;
    gap:6px;
    padding:0 20px 16px;
  }
  .tab-btn{
    flex:1;
    padding:11px 0;
    text-align:center;
    background:transparent;
    border:1px solid var(--hairline);
    border-radius:var(--radius-sm);
    color:var(--ink-muted);
    font-family:var(--font-mono);
    font-size:0.8rem;
    letter-spacing:1.5px;
    text-transform:uppercase;
    cursor:pointer;
  }
  .tab-btn.active{
    background:var(--surface-2);
    border-color:var(--brass-dim);
    color:var(--brass);
  }

  /* ---------- DASHBOARD ---------- */
  #dashboard{
    display:flex;
    flex-direction:column;
    padding:0 16px 16px;
    gap:12px;
    overflow-y:auto;
    padding-bottom:110px;
  }

  .category-card{
    position:relative;
    display:flex;
    flex-direction:column;
    border:1px solid var(--hairline);
    border-radius:var(--radius-md);
    padding:18px 18px 18px 22px;
    background:var(--surface);
    overflow:hidden;
  }
  /* ledger index-tab notch: signature element */
  .category-card::before{
    content:"";
    position:absolute;
    left:0; top:14px; bottom:14px;
    width:4px;
    border-radius:0 3px 3px 0;
    background:var(--tab-color, var(--brass-dim));
  }

  .master-card{
    border-color:var(--brass-dim);
    background:linear-gradient(135deg, var(--surface-2), var(--surface));
  }
  .master-card::before{ background:var(--brass); width:5px; }

  .balance-masked{
    font-family:var(--font-mono);
    font-size:1.9rem;
    font-weight:600;
    letter-spacing:3px;
    color:var(--ink-faint);
  }
  .btn-toggle-balance{
    margin-top:10px;
    background:transparent;
    border:1px solid var(--brass-dim);
    color:var(--brass);
    border-radius:var(--radius-sm);
    padding:8px 14px;
    font-size:0.72rem;
    font-family:var(--font-mono);
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
  }

  .statement-balance{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 18px 14px;
  }
  .statement-balance .label{ font-size:0.72rem; color:var(--ink-muted); text-transform:uppercase; letter-spacing:1.5px; }
  .balance-interactive{ display:flex; align-items:center; gap:10px; }
  .balance-interactive .value{ font-family:var(--font-mono); font-size:1.6rem; font-weight:600; color:var(--brass); }
  .balance-masked-sm{
    font-family:var(--font-mono);
    font-size:1.6rem;
    font-weight:600;
    letter-spacing:2px;
    color:var(--ink-faint);
  }
  .balance-interactive input{ width:150px; padding:8px 10px; font-size:1rem; text-align:right; }

  .card-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }
  .category-card h2{
    font-size:0.72rem;
    font-weight:600;
    color:var(--ink-muted);
    text-transform:uppercase;
    letter-spacing:1.5px;
    padding-top:4px;
  }
  .master-card h2{ color:var(--brass); }

  .balance-container{ text-align:right; }
  .category-card p.amount{
    font-family:var(--font-mono);
    font-size:1.9rem;
    font-weight:600;
    line-height:1.1;
  }
  .category-card span.sub{ font-size:0.72rem; color:var(--ink-faint); font-family:var(--font-mono); }

  .progress-bar-container{
    height:5px;
    width:100%;
    background:var(--hairline-soft);
    border-radius:3px;
    margin-top:14px;
    overflow:hidden;
  }
  .fill{ height:100%; background:var(--credit); border-radius:3px; transition:width .3s ease; }
  .low-balance{ background:var(--debit) !important; }
  .text-danger{ color:var(--debit) !important; }

  /* ---------- STATEMENT VIEW ---------- */
  #statement-view{
    display:none;
    flex-direction:column;
    padding:0 16px 110px;
    gap:0;
    overflow-y:auto;
  }
  .statement-paper{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:var(--radius-md);
    overflow:hidden;
  }
  .statement-perf{
    height:14px;
    background-image: radial-gradient(circle at 10px 7px, var(--bg) 5px, transparent 5.5px);
    background-size: 20px 14px;
    background-repeat: repeat-x;
    background-color:var(--surface);
  }
  .statement-head{
    display:flex; justify-content:space-between; align-items:baseline;
    padding:16px 18px 12px;
    border-bottom:1px dashed var(--hairline);
  }
  .statement-head h3{ font-family:var(--font-mono); font-size:0.85rem; letter-spacing:1px; color:var(--ink-muted); text-transform:uppercase; }
  .statement-head span{ font-family:var(--font-mono); font-size:0.75rem; color:var(--ink-faint); }

  .txn-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 18px;
    border-bottom:1px solid var(--hairline-soft);
  }
  .txn-row:last-child{ border-bottom:none; }
  .txn-icon{
    width:34px; height:34px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:0.95rem;
    flex-shrink:0;
    font-family:var(--font-mono);
    font-weight:700;
  }
  .txn-icon.credit{ background:rgba(95,191,143,0.15); color:var(--credit); }
  .txn-icon.debit{ background:rgba(226,102,90,0.15); color:var(--debit); }

  .txn-mid{ flex:1; min-width:0; }
  .txn-title{ font-size:0.92rem; font-weight:600; color:var(--ink); }
  .txn-remark{ font-size:0.78rem; color:var(--ink-muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .txn-time{ font-size:0.68rem; color:var(--ink-faint); margin-top:3px; font-family:var(--font-mono); }

  .txn-right{ text-align:right; flex-shrink:0; }
  .txn-amount{ font-family:var(--font-mono); font-weight:600; font-size:0.95rem; }
  .txn-amount.credit{ color:var(--credit); }
  .txn-amount.debit{ color:var(--debit); }
  .txn-balance{ font-family:var(--font-mono); font-size:0.68rem; color:var(--ink-faint); margin-top:3px; }

  .txn-delete{
    background:transparent;
    border:1px solid var(--hairline);
    color:var(--ink-faint);
    border-radius:6px;
    width:26px; height:26px;
    font-size:0.85rem;
    flex-shrink:0;
    cursor:pointer;
    line-height:1;
  }
  .txn-delete:active{ border-color:var(--debit); color:var(--debit); }

  .txn-reverse{
    background:transparent;
    border:1px solid var(--hairline);
    color:var(--ink-faint);
    border-radius:6px;
    width:26px; height:26px;
    font-size:0.9rem;
    flex-shrink:0;
    cursor:pointer;
    line-height:1;
  }
  .txn-reverse:active{ border-color:var(--brass); color:var(--brass); }

  .txn-tag{
    font-family:var(--font-mono);
    font-size:0.62rem;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--ink-faint);
    border:1px solid var(--hairline);
    border-radius:6px;
    padding:5px 8px;
    flex-shrink:0;
    white-space:nowrap;
  }
  .txn-row.is-reversed{ opacity:0.55; }
  .txn-row.is-reversal{ background:rgba(217,169,78,0.03); }

  .statement-empty{
    padding:48px 20px;
    text-align:center;
    color:var(--ink-faint);
    font-family:var(--font-mono);
    font-size:0.85rem;
    letter-spacing:0.5px;
  }

  /* ---------- FAB ---------- */
  #fab-add{
    position:fixed;
    bottom:28px;
    right:20px;
    width:60px; height:60px;
    background:var(--brass);
    color:#1A1508;
    font-size:2rem;
    border:none;
    border-radius:50%;
    display:flex; justify-content:center; align-items:center;
    cursor:pointer;
    z-index:50;
    line-height:1;
    box-shadow:0 8px 24px rgba(217,169,78,0.35);
  }

  /* ---------- MODALS ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(6,5,3,0.88);
    backdrop-filter:blur(2px);
    z-index:100;
    display:none;
    flex-direction:column;
    justify-content:flex-end;
    padding:16px;
  }
  .modal-overlay.center{ justify-content:center; }

  .modal-content{
    width:100%;
    max-width:420px;
    margin:0 auto;
    background:var(--surface-2);
    border:1px solid var(--hairline);
    border-radius:var(--radius-lg);
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .modal-content h2{
    font-family:var(--font-mono);
    text-transform:uppercase;
    font-size:0.95rem;
    letter-spacing:1.5px;
    color:var(--brass);
    margin-bottom:4px;
    padding-bottom:10px;
    border-bottom:1px solid var(--hairline);
  }

  label.field-label{ font-size:0.72rem; color:var(--ink-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:-6px; }

  input{
    width:100%;
    background:var(--bg);
    border:1px solid var(--hairline);
    border-radius:var(--radius-sm);
    color:var(--ink);
    padding:14px 16px;
    font-size:1rem;
    font-family:var(--font-sans);
    outline:none;
  }
  input::placeholder{ color:var(--ink-faint); }
  input:focus{ border-color:var(--brass); }

  button.action-btn{
    background:var(--brass);
    color:#1A1508;
    border:none;
    border-radius:var(--radius-sm);
    padding:15px;
    font-size:1rem;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.5px;
    cursor:pointer;
    font-family:var(--font-sans);
  }
  button.action-btn.btn-success{ background:var(--credit); color:#0B1A11; }
  button.btn-cancel-modal{
    background:transparent;
    color:var(--ink-muted);
    border:1px solid var(--hairline);
    border-radius:var(--radius-sm);
    padding:15px;
    font-size:1rem;
    font-family:var(--font-sans);
    cursor:pointer;
  }

  .toggle-group{ display:flex; width:100%; border:1px solid var(--hairline); border-radius:var(--radius-sm); overflow:hidden; }
  .toggle-btn{ flex:1; padding:13px; background:transparent; color:var(--ink-muted); border:none; font-size:1rem; font-weight:600; cursor:pointer; font-family:var(--font-sans); }
  .toggle-btn.active{ background:var(--brass); color:#1A1508; }

  #entry-amount{
    font-family:var(--font-mono);
    font-size:3rem;
    text-align:center;
    border:none;
    border-bottom:2px solid var(--hairline);
    border-radius:0;
    padding:8px;
    background:transparent;
  }

  .category-selector{ display:flex; overflow-x:auto; gap:8px; padding-bottom:4px; }
  .category-selector::-webkit-scrollbar{ display:none; }
  .category-pill{
    background:var(--bg);
    border:1px solid var(--hairline);
    border-radius:20px;
    color:var(--ink-muted);
    padding:10px 20px;
    white-space:nowrap;
    cursor:pointer;
    font-size:0.95rem;
    font-family:var(--font-sans);
  }
  .category-pill.selected{ border-color:var(--brass); color:var(--brass); background:rgba(217,169,78,0.08); }

  .edit-input-group{ display:none; flex-direction:column; gap:8px; width:58%; }
  .edit-input-group input{ padding:9px 12px; font-size:0.9rem; }
  .edit-mode .balance-container{ display:none; }
  .edit-mode .edit-input-group{ display:flex; }

  .btn-delete{
    display:none;
    position:absolute; top:14px; right:14px;
    background:transparent;
    color:var(--debit);
    border:1px solid var(--debit);
    border-radius:6px;
    width:28px; height:28px;
    font-size:0.95rem; font-weight:bold;
    cursor:pointer;
  }
  .category-card.edit-mode:not(.master-card) .btn-delete{ display:block; }

  #add-category-card{
    display:none;
    border:1px dashed var(--hairline);
    border-radius:var(--radius-md);
    text-align:center;
    cursor:pointer;
    background:transparent;
    color:var(--ink-faint);
    font-size:0.9rem;
    padding:20px;
    font-family:var(--font-mono);
    letter-spacing:1px;
  }
  .edit-mode-active #add-category-card{ display:block; }

  #loading-indicator{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-faint);
    font-size:0.85rem;
    letter-spacing:2px;
    font-family:var(--font-mono);
  }

  #debug-panel{
    display:none;
    width:100%;
    background:rgba(226,102,90,0.08);
    border:1px solid var(--debit);
    border-radius:var(--radius-sm);
    color:#F3B3AC;
    padding:12px 14px;
    font-size:0.78rem;
    line-height:1.5;
    white-space:pre-wrap;
    word-break:break-word;
    max-height:180px;
    overflow-y:auto;
    font-family:var(--font-mono);
  }

  #toast{
    position:fixed;
    bottom:30px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--surface-2);
    border:1px solid var(--hairline);
    color:var(--ink);
    padding:12px 20px;
    border-radius:var(--radius-sm);
    font-size:0.85rem;
    z-index:200;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="app">
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">Panda Ledger</span>
      <span class="brand-month" id="month-display">—</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-install" title="Install app">⇩</button>
      <button class="icon-btn" id="btn-auth" title="Settings">⚙</button>
      <button class="icon-btn" id="btn-edit" title="Edit">✎</button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-ledger">Ledger</button>
    <button class="tab-btn" id="tab-statement">Statement</button>
  </div>

  <main id="dashboard">
    <div id="loading-indicator">FETCHING REMOTE STATE…</div>
    <div id="card-mount-point"></div>
    <div id="add-category-card" class="category-card">+ ADD NEW CATEGORY</div>
  </main>

  <main id="statement-view">
    <div class="statement-paper">
      <div class="statement-balance">
        <span class="label">Current Balance</span>
        <div class="balance-interactive" id="balance-interactive"></div>
      </div>
      <div class="statement-head">
        <h3>Transaction History</h3>
        <span id="statement-count">0 entries</span>
      </div>
      <div id="statement-list"></div>
      <div class="statement-perf"></div>
    </div>
  </main>

  <button id="fab-add" style="display:none;">+</button>

  <section class="modal-overlay" id="modal-container">

    <div id="auth-modal" class="modal-content" style="display:none;">
      <h2>System Init</h2>
      <label class="field-label">GitHub Personal Access Token</label>
      <input type="text" id="github-pat" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <label class="field-label">Gist ID</label>
      <input type="text" id="gist-id" placeholder="e.g. 41de6a56d9e8b3b20ac246a" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button class="action-btn" id="btn-connect">Connect Database</button>
      <div id="debug-panel"></div>
    </div>

    <div id="entry-modal" class="modal-content" style="display:none;">
      <h2>New Entry</h2>
      <div class="toggle-group">
        <button class="toggle-btn active" id="toggle-spend">SPEND</button>
        <button class="toggle-btn" id="toggle-deposit">DEPOSIT</button>
      </div>
      <input type="number" id="entry-amount" placeholder="0" inputmode="numeric">
      <div class="category-selector" id="entry-category-selector"></div>
      <label class="field-label">Remark</label>
      <input type="text" id="entry-remark" placeholder="What was this for? (optional)">
      <button class="action-btn" id="btn-submit-entry">DEDUCT</button>
      <button class="action-btn btn-cancel-modal">CANCEL</button>
    </div>

    <div id="edit-modal" class="modal-content" style="display:none;">
      <h2>New Category</h2>
      <input type="text" id="new-category-name" placeholder="Category Name">
      <input type="number" id="new-category-budget" placeholder="Allocated Budget" inputmode="numeric">
      <button class="action-btn" id="btn-create-category">CREATE</button>
      <button class="action-btn btn-cancel-modal">CANCEL</button>
    </div>

  </section>

  <div id="toast"></div>
</div>

<script>
  const DOM = {
    overlay: document.getElementById('modal-container'),
    authModal: document.getElementById('auth-modal'),
    entryModal: document.getElementById('entry-modal'),
    editModal: document.getElementById('edit-modal'),
    fab: document.getElementById('fab-add'),
    btnAuth: document.getElementById('btn-auth'),
    btnEdit: document.getElementById('btn-edit'),
    btnInstall: document.getElementById('btn-install'),
    btnConnect: document.getElementById('btn-connect'),
    cancelBtns: document.querySelectorAll('.btn-cancel-modal'),
    btnSubmitEntry: document.getElementById('btn-submit-entry'),
    entryAmount: document.getElementById('entry-amount'),
    entryRemark: document.getElementById('entry-remark'),
    addCategoryCard: document.getElementById('add-category-card'),
    dashboard: document.getElementById('dashboard'),
    cardMount: document.getElementById('card-mount-point'),
    toggleSpend: document.getElementById('toggle-spend'),
    toggleDeposit: document.getElementById('toggle-deposit'),
    categorySelector: document.getElementById('entry-category-selector'),
    btnCreateCategory: document.getElementById('btn-create-category'),
    newCategoryName: document.getElementById('new-category-name'),
    newCategoryBudget: document.getElementById('new-category-budget'),
    loading: document.getElementById('loading-indicator'),
    monthDisplay: document.getElementById('month-display'),
    githubPatInput: document.getElementById('github-pat'),
    gistIdInput: document.getElementById('gist-id'),
    debugPanel: document.getElementById('debug-panel'),
    tabLedger: document.getElementById('tab-ledger'),
    tabStatement: document.getElementById('tab-statement'),
    statementView: document.getElementById('statement-view'),
    statementList: document.getElementById('statement-list'),
    statementCount: document.getElementById('statement-count'),
    balanceInteractive: document.getElementById('balance-interactive'),
    toast: document.getElementById('toast')
  };

  const TAB_COLORS = ['#D9A94E', '#5FBF8F', '#E2665A', '#7EA8D9', '#B98AD9', '#D9C15F'];

  let state = null;
  let isEditMode = false;
  let entryMode = 'spend';
  let activeTab = 'ledger';
  let balanceVisible = false;

  function showDebug(message){ DOM.debugPanel.textContent = message; DOM.debugPanel.style.display = 'block'; }
  function clearDebug(){ DOM.debugPanel.style.display = 'none'; DOM.debugPanel.textContent = ''; }

  function showToast(msg){
    DOM.toast.textContent = msg;
    DOM.toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => DOM.toast.classList.remove('show'), 2200);
  }

  function getCredentials(){
    return { pat: localStorage.getItem('panda_pat'), id: localStorage.getItem('panda_gist_id') };
  }

  function ensureShape(){
    if (!state.metadata) state.metadata = {};
    if (!Array.isArray(state.transactions)) state.transactions = [];
  }

  async function fetchStateFromGitHub(){
    const creds = getCredentials();
    if (!creds.pat || !creds.id) return false;

    try {
      const response = await fetch(`https://api.github.com/gists/${creds.id}`, {
        headers: { 'Authorization': `Bearer ${creds.pat}` }
      });

      const bodyText = await response.text();
      let bodyJson = null;
      try { bodyJson = JSON.parse(bodyText); } catch (e) {}

      if (!response.ok) {
        const ghMessage = bodyJson && bodyJson.message ? bodyJson.message : bodyText;
        throw new Error(`HTTP ${response.status} ${response.statusText}: ${ghMessage}`);
      }

      const data = bodyJson;
      if (!data.files || !data.files['gist.json']) {
        const availableFiles = data.files ? Object.keys(data.files).join(', ') : '(none)';
        throw new Error(`Gist found, but no file named "gist.json" exists in it. Files present: ${availableFiles}`);
      }

      const rawContent = data.files['gist.json'].content;
      state = JSON.parse(rawContent);
      ensureShape();
      clearDebug();
      return true;
    } catch (err) {
      console.error("Fetch failure:", err);
      showDebug("CONNECTION FAILED:\n" + err.message);
      return false;
    }
  }

  async function pushStateToGitHub(){
    const creds = getCredentials();
    if (!creds.pat || !creds.id || !state) return;

    DOM.loading.style.display = 'block';
    DOM.loading.textContent = 'SYNCING TO CLOUD…';

    try {
      const response = await fetch(`https://api.github.com/gists/${creds.id}`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${creds.pat}`, 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({ files: { 'gist.json': { content: JSON.stringify(state, null, 2) } } })
      });

      if (!response.ok) {
        const bodyText = await response.text();
        let bodyJson = null;
        try { bodyJson = JSON.parse(bodyText); } catch (e) {}
        const ghMessage = bodyJson && bodyJson.message ? bodyJson.message : bodyText;
        throw new Error(`HTTP ${response.status} ${response.statusText}: ${ghMessage}`);
      }
    } catch (err) {
      console.error("Sync failure:", err);
      showToast("Sync failed — " + err.message);
    } finally {
      DOM.loading.style.display = 'none';
    }
  }

  function evaluateMonthlyReset(){
    const now = new Date();
    const currentMonthString = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    const monthNames = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
    DOM.monthDisplay.textContent = `${monthNames[now.getMonth()]} ${now.getFullYear()}`;

    if (state.metadata.last_refresh !== currentMonthString) {
      for (let key in state.categories) {
        state.categories[key].current_balance = state.categories[key].allocated_budget;
      }
      state.metadata.last_refresh = currentMonthString;
      pushStateToGitHub();
    }
  }

  function renderEngine(){
    DOM.cardMount.innerHTML = '';
    DOM.categorySelector.innerHTML = '';

    let firstKey = true;
    let colorIdx = 0;
    for (let key in state.categories) {
      const cat = state.categories[key];
      const pct = cat.allocated_budget > 0 ? Math.max(0, Math.min(100, (cat.current_balance / cat.allocated_budget) * 100)) : 0;
      const isLow = pct <= 20;
      const tabColor = TAB_COLORS[colorIdx % TAB_COLORS.length];
      colorIdx++;

      const card = document.createElement('div');
      card.className = 'category-card' + (isEditMode ? ' edit-mode' : '');
      card.dataset.key = key;
      card.style.setProperty('--tab-color', tabColor);

      card.innerHTML = `
        <div class="card-header">
          <h2>${cat.name}</h2>
          <div class="balance-container">
            <p class="amount ${isLow ? 'text-danger' : ''}">₹${cat.current_balance.toLocaleString('en-IN')}</p>
            <span class="sub">left of ₹${cat.allocated_budget.toLocaleString('en-IN')}</span>
          </div>
          <div class="edit-input-group">
            <input type="number" value="${cat.current_balance}" placeholder="Balance" class="input-balance">
            <input type="number" value="${cat.allocated_budget}" placeholder="Budget" class="input-budget">
          </div>
          <button class="btn-delete">×</button>
        </div>
        <div class="progress-bar-container"><div class="fill ${isLow ? 'low-balance' : ''}" style="width: ${pct}%;"></div></div>
      `;
      DOM.cardMount.appendChild(card);

      const pill = document.createElement('div');
      pill.className = 'category-pill' + (firstKey ? ' selected' : '');
      pill.dataset.key = key;
      pill.textContent = cat.name;
      pill.addEventListener('click', (e) => {
        document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('selected'));
        e.target.classList.add('selected');
      });
      DOM.categorySelector.appendChild(pill);
      firstKey = false;
    }
  }

  function formatDateTime(iso){
    const d = new Date(iso);
    const datePart = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    const timePart = d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    return `${datePart} · ${timePart}`;
  }

  function renderBalanceStrip(){
    if (isEditMode) {
      DOM.balanceInteractive.innerHTML = `<input type="number" id="master-balance-input" value="${state.bank_balance}" placeholder="Bank Balance">`;
      return;
    }
    if (balanceVisible) {
      DOM.balanceInteractive.innerHTML = `
        <span class="value">₹${state.bank_balance.toLocaleString('en-IN')}</span>
        <button class="btn-toggle-balance" id="btn-toggle-balance">Hide Balance</button>
      `;
    } else {
      DOM.balanceInteractive.innerHTML = `
        <span class="balance-masked-sm">₹••,•••</span>
        <button class="btn-toggle-balance" id="btn-toggle-balance">Show Balance</button>
      `;
    }
    const toggleBtn = document.getElementById('btn-toggle-balance');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        balanceVisible = !balanceVisible;
        renderBalanceStrip();
      });
    }
  }

  function isCreditTxn(t){
    return t.direction ? t.direction === 'credit' : t.type === 'deposit';
  }

  function baseLabel(t){
    return isCreditTxn(t) ? 'Deposit' : (t.category_name || 'Spend');
  }

  function renderStatement(){
    renderBalanceStrip();

    const txns = (state.transactions || []).slice().reverse();
    DOM.statementCount.textContent = `${txns.length} ${txns.length === 1 ? 'entry' : 'entries'}`;

    if (txns.length === 0) {
      DOM.statementList.innerHTML = `<div class="statement-empty">No transactions yet.<br>Every deposit and spend will show up here.</div>`;
      return;
    }

    DOM.statementList.innerHTML = txns.map(t => {
      const isCredit = isCreditTxn(t);
      const sign = isCredit ? '+' : '−';
      const label = t.is_reversal ? `Reversal · ${t.original_label}` : baseLabel(t);

      let actionHtml;
      if (t.is_reversal) {
        actionHtml = `<span class="txn-tag">Reversal</span>`;
      } else if (t.reversed) {
        actionHtml = `<span class="txn-tag">Reversed</span>`;
      } else {
        actionHtml = `<button class="txn-reverse" data-txn-id="${t.id}" title="Reverse entry">↺</button>`;
      }

      const rowClasses = ['txn-row'];
      if (t.reversed) rowClasses.push('is-reversed');
      if (t.is_reversal) rowClasses.push('is-reversal');

      return `
        <div class="${rowClasses.join(' ')}" data-txn-id="${t.id}">
          <div class="txn-icon ${isCredit ? 'credit' : 'debit'}">${isCredit ? '↓' : '↑'}</div>
          <div class="txn-mid">
            <div class="txn-title">${label}</div>
            <div class="txn-remark">${t.remark ? escapeHtml(t.remark) : 'No remark'}</div>
            <div class="txn-time">${formatDateTime(t.timestamp)}</div>
          </div>
          <div class="txn-right">
            <div class="txn-amount ${isCredit ? 'credit' : 'debit'}">${sign}₹${t.amount.toLocaleString('en-IN')}</div>
            <div class="txn-balance">bal ₹${t.balance_after.toLocaleString('en-IN')}</div>
          </div>
          ${actionHtml}
        </div>
      `;
    }).join('');
  }

  function reverseTransaction(txnId){
    const idx = state.transactions.findIndex(t => String(t.id) === String(txnId));
    if (idx === -1) return;
    const original = state.transactions[idx];

    if (original.reversed || original.is_reversal) return; // guard: already handled, button shouldn't exist anyway

    const originalWasCredit = isCreditTxn(original);
    const label = baseLabel(original);

    if (!confirm(`Reverse this ${originalWasCredit ? 'deposit' : 'spend'} of ₹${original.amount.toLocaleString('en-IN')} (${label})? A reversal entry will be added and your balance adjusted.`)) return;

    // Apply the opposite effect on live balances.
    if (originalWasCredit) {
      state.bank_balance -= original.amount;
    } else {
      state.bank_balance += original.amount;
      if (original.category_key && state.categories[original.category_key]) {
        state.categories[original.category_key].current_balance += original.amount;
      }
    }

    // Mark the original as reversed but keep it in history untouched otherwise.
    original.reversed = true;

    // Add a new, visible reversal entry — the original row is never edited or hidden.
    const reversal = {
      id: Date.now() + '-r-' + Math.random().toString(36).slice(2, 8),
      type: original.type,
      direction: originalWasCredit ? 'debit' : 'credit',
      amount: original.amount,
      remark: `Reversal of ${formatDateTime(original.timestamp)}${original.remark ? ' — ' + original.remark : ''}`,
      timestamp: new Date().toISOString(),
      category_key: original.category_key || null,
      category_name: original.category_name || null,
      is_reversal: true,
      reverses_id: original.id,
      original_label: label,
      balance_after: state.bank_balance
    };

    state.transactions.push(reversal);

    renderEngine();
    renderStatement();
    pushStateToGitHub();
    showToast('Reversal entry added');
  }

  DOM.statementList.addEventListener('click', (e) => {
    const btn = e.target.closest('.txn-reverse');
    if (btn) reverseTransaction(btn.dataset.txnId);
  });

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function switchTab(tab){
    activeTab = tab;
    if (tab === 'ledger') {
      DOM.tabLedger.classList.add('active');
      DOM.tabStatement.classList.remove('active');
      DOM.dashboard.style.display = 'flex';
      DOM.statementView.style.display = 'none';
      DOM.fab.style.display = isEditMode ? 'none' : 'flex';
    } else {
      DOM.tabStatement.classList.add('active');
      DOM.tabLedger.classList.remove('active');
      DOM.dashboard.style.display = 'none';
      DOM.statementView.style.display = 'flex';
      DOM.fab.style.display = 'none';
      renderStatement();
    }
  }
  DOM.tabLedger.addEventListener('click', () => switchTab('ledger'));
  DOM.tabStatement.addEventListener('click', () => switchTab('statement'));

  function showModal(modalElement, center){
    DOM.overlay.style.display = 'flex';
    DOM.overlay.classList.toggle('center', !!center);
    DOM.authModal.style.display = 'none';
    DOM.entryModal.style.display = 'none';
    DOM.editModal.style.display = 'none';
    modalElement.style.display = 'flex';
  }

  function hideModals(){
    DOM.overlay.style.display = 'none';
    DOM.entryAmount.value = '';
    DOM.entryRemark.value = '';
    DOM.newCategoryName.value = '';
    DOM.newCategoryBudget.value = '';
    setEntryMode('spend');
  }

  function setEntryMode(mode){
    entryMode = mode;
    if (mode === 'spend') {
      DOM.toggleSpend.classList.add('active');
      DOM.toggleDeposit.classList.remove('active');
      DOM.categorySelector.style.display = 'flex';
      DOM.btnSubmitEntry.textContent = 'DEDUCT';
      DOM.btnSubmitEntry.classList.remove('btn-success');
    } else {
      DOM.toggleDeposit.classList.add('active');
      DOM.toggleSpend.classList.remove('active');
      DOM.categorySelector.style.display = 'none';
      DOM.btnSubmitEntry.textContent = 'ADD FUNDS';
      DOM.btnSubmitEntry.classList.add('btn-success');
    }
  }

  DOM.toggleSpend.addEventListener('click', () => setEntryMode('spend'));
  DOM.toggleDeposit.addEventListener('click', () => setEntryMode('deposit'));

  DOM.fab.addEventListener('click', () => {
    if (isEditMode) return;
    showModal(DOM.entryModal);
    setTimeout(() => DOM.entryAmount.focus(), 100);
  });

  DOM.cancelBtns.forEach(btn => btn.addEventListener('click', hideModals));

  DOM.btnConnect.addEventListener('click', async () => {
    clearDebug();
    const pat = DOM.githubPatInput.value.trim();
    const id = DOM.gistIdInput.value.trim();
    if (!pat || !id) return showDebug("CONNECTION FAILED:\nPAT field or Gist ID field is empty. Tap directly into the field and type/paste the value manually.");
    localStorage.setItem('panda_pat', pat);
    localStorage.setItem('panda_gist_id', id);
    initSystem();
  });

  DOM.btnAuth.addEventListener('click', () => {
    const creds = getCredentials();
    DOM.githubPatInput.value = creds.pat || '';
    DOM.gistIdInput.value = creds.id || '';
    clearDebug();
    showModal(DOM.authModal, true);
  });

  DOM.btnCreateCategory.addEventListener('click', () => {
    const name = DOM.newCategoryName.value.trim();
    const budget = parseInt(DOM.newCategoryBudget.value, 10);
    if (!name || isNaN(budget) || budget < 0) return;

    const generatedKey = name.toLowerCase().replace(/[^a-z0-9]/g, '_');
    state.categories[generatedKey] = { name: name, allocated_budget: budget, current_balance: budget };

    renderEngine();
    hideModals();
    pushStateToGitHub();
  });

  DOM.btnSubmitEntry.addEventListener('click', () => {
    const amount = parseInt(DOM.entryAmount.value, 10);
    if (!amount || isNaN(amount) || amount <= 0) return;
    const remark = DOM.entryRemark.value.trim();

    const txn = {
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 8),
      type: entryMode,
      direction: entryMode === 'deposit' ? 'credit' : 'debit',
      amount: amount,
      remark: remark,
      timestamp: new Date().toISOString()
    };

    if (entryMode === 'deposit') {
      state.bank_balance += amount;
      txn.category_key = null;
      txn.category_name = null;
    } else {
      const selectedPill = document.querySelector('.category-pill.selected');
      if (!selectedPill) return;
      const targetKey = selectedPill.dataset.key;
      state.categories[targetKey].current_balance -= amount;
      state.bank_balance -= amount;
      txn.category_key = targetKey;
      txn.category_name = state.categories[targetKey].name;
    }
    txn.balance_after = state.bank_balance;

    if (!Array.isArray(state.transactions)) state.transactions = [];
    state.transactions.push(txn);

    renderEngine();
    hideModals();
    pushStateToGitHub();
    showToast(entryMode === 'deposit' ? 'Deposit recorded' : 'Spend recorded');
    if (activeTab === 'statement') renderStatement();
  });

  DOM.dashboard.addEventListener('click', (e) => {
    if (e.target.classList.contains('btn-delete')) {
      const card = e.target.closest('.category-card');
      if (card && card.dataset.key) {
        delete state.categories[card.dataset.key];
        renderEngine();
        pushStateToGitHub();
      }
    }
  });

  DOM.addCategoryCard.addEventListener('click', () => showModal(DOM.editModal, true));

  DOM.btnEdit.addEventListener('click', () => {
    isEditMode = !isEditMode;

    if (isEditMode) {
      DOM.btnEdit.textContent = '💾';
      DOM.dashboard.classList.add('edit-mode-active');
      DOM.fab.style.display = 'none';
      renderEngine();
      renderBalanceStrip();
    } else {
      DOM.btnEdit.textContent = '✎';
      DOM.dashboard.classList.remove('edit-mode-active');
      if (activeTab === 'ledger') DOM.fab.style.display = 'flex';

      const masterInput = document.getElementById('master-balance-input');
      if (masterInput) state.bank_balance = parseInt(masterInput.value, 10) || 0;

      document.querySelectorAll('.category-card[data-key]').forEach(card => {
        const key = card.dataset.key;
        if (state.categories[key]) {
          state.categories[key].current_balance = parseInt(card.querySelector('.input-balance').value, 10) || 0;
          state.categories[key].allocated_budget = parseInt(card.querySelector('.input-budget').value, 10) || 0;
        }
      });

      renderEngine();
      renderBalanceStrip();
      pushStateToGitHub();
    }
  });

  // ---------- PWA install ----------
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    DOM.btnInstall.style.display = 'flex';
  });
  DOM.btnInstall.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    DOM.btnInstall.style.display = 'none';
  });
  window.addEventListener('appinstalled', () => { DOM.btnInstall.style.display = 'none'; });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(err => console.warn('SW registration failed:', err));
    });
  }

  // ---------- Boot ----------
  async function initSystem(){
    DOM.loading.style.display = 'block';
    DOM.loading.textContent = 'FETCHING REMOTE STATE…';
    DOM.fab.style.display = 'none';

    const success = await fetchStateFromGitHub();
    DOM.loading.style.display = 'none';

    if (success) {
      evaluateMonthlyReset();
      renderEngine();
      renderBalanceStrip();
      if (activeTab === 'ledger') DOM.fab.style.display = 'flex';
    } else {
      showModal(DOM.authModal, true);
    }
  }

  initSystem();
</script>
</body>
</html>
